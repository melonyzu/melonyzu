<svg width="1000" height="240" viewBox="0 0 1000 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="melon — developer tools, networking, backend systems, terminal apps, ai tooling">
  <defs>
    <pattern id="grid" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="1" fill="#e6edf3" fill-opacity="0.035"/>
    </pattern>
    <clipPath id="frame">
      <rect x="1" y="1" width="998" height="238" rx="14"/>
    </clipPath>
    <style>
      .mono  { font-family: ui-monospace, "SF Mono", "Cascadia Code", Menlo, Consolas, monospace; }
      .fg    { fill: #e6edf3; }
      .muted { fill: #8b949e; }
      .dim   { fill: #484f58; }
    </style>
  </defs>

  <rect x="1" y="1" width="998" height="238" rx="14" fill="#0d1117" stroke="#21262d" stroke-width="2"/>
  <g clip-path="url(#frame)">
    <rect x="0" y="0" width="1000" height="240" fill="url(#grid)"/>
  </g>

  <circle cx="30" cy="30" r="6" fill="#21262d" stroke="#30363d"/>
  <circle cx="52" cy="30" r="6" fill="#21262d" stroke="#30363d"/>
  <circle cx="74" cy="30" r="6" fill="#21262d" stroke="#30363d"/>
  <text x="500" y="35" text-anchor="middle" class="mono dim" font-size="13">melon — zsh</text>
  <line x1="1" y1="52" x2="999" y2="52" stroke="#21262d" stroke-width="1.5"/>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.2s" dur="0.5s" fill="freeze"/>
    <text x="36" y="94" class="mono" font-size="17"><tspan fill="#484f58">~</tspan> <tspan fill="#8b949e">❯</tspan> <tspan class="fg">whoami</tspan></text>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="0.7s" dur="0.5s" fill="freeze"/>
    <text x="42" y="172" class="mono" font-size="56" font-weight="700" letter-spacing="2" fill="#161b22">melon</text>
    <text x="39" y="169" class="mono" font-size="56" font-weight="700" letter-spacing="2" fill="#21262d">melon</text>
    <text x="36" y="166" class="mono fg" font-size="56" font-weight="700" letter-spacing="2">melon</text>
    <rect x="232" y="124" width="14" height="44" fill="#e6edf3">
      <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" begin="1.4s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g opacity="0">
    <animate attributeName="opacity" from="0" to="1" begin="1.1s" dur="0.5s" fill="freeze"/>
    <text x="36" y="206" class="mono muted" font-size="15">developer tools · networking · backend systems · terminal apps · ai tooling</text>
    <text x="964" y="206" text-anchor="end" class="mono dim" font-size="13">github.com/melonyzu</text>
  </g>
</svg>
